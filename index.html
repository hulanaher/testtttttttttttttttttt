<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PetGame v6.0</title>
    <style>
        :root {
            --bg-color: #f8d088;
            --panel-color: #fffbe6;
            --border-color: #5d4037;
            --accent-color: #d35400;
            --fans-color: #2980b9;
        }

        body {
            background-color: #333; display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0;
            font-family: "Courier New", "Microsoft YaHei", monospace;
        }

        #game-container {
            width: 480px; background-color: var(--bg-color);
            border: 6px solid var(--border-color); border-radius: 12px;
            padding: 15px; box-shadow: 0 10px 0 #222; position: relative;
        }

        .status-bar {
            background: var(--panel-color); border: 3px solid var(--border-color);
            padding: 10px; margin-bottom: 12px; font-weight: bold;
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 14px;
        }

        #stage {
            height: 380px; background-color: #aed581;
            border: 3px solid var(--border-color); position: relative; overflow: hidden;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #pet-anchor {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); transition: left 0.5s linear, opacity 0.5s;
            display: flex; flex-direction: column; align-items: center;
        }

        #pet-img { width: 250px; height: auto; image-rendering: pixelated; }

        #bubble {
            position: absolute; bottom: 105%; background: white; 
            border: 3px solid var(--border-color); border-radius: 12px;
            padding: 8px 16px; font-size: 14px; display: none; z-index: 10;
            white-space: nowrap; box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }
        #bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%;
            transform: translateX(-50%); border-left: 8px solid transparent;
            border-right: 8px solid transparent; border-top: 10px solid var(--border-color);
        }

        .controls { 
            display: flex; 
            justify-content: space-between; 
            gap: 5px; 
            margin-top: 15px; 
        }
        .icon-btn {
            flex: 1;
            height: 50px;
            background: #fff; border: 3px solid var(--border-color);
            cursor: pointer; font-size: 22px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 2px 2px 0 var(--border-color); transition: 0.1s;
            border-radius: 10px;
            position: relative;
        }
        .icon-btn:active:not(:disabled) { box-shadow: 0 0 0; transform: translate(2px, 2px); }
        
        .album-btn { background: #ffe082; }
        .gashapon-btn { background: #ff7675; }
        .work-btn { background: #a29bfe; }
        .lock-style { filter: grayscale(1); opacity: 0.7; }

        .log {
            margin-top: 10px; height: 80px; background: #eee;
            border: 2px solid var(--border-color); font-size: 12px;
            padding: 8px; overflow-y: auto; line-height: 1.5;
        }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }

        #work-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: none; z-index: 200;
            justify-content: center; align-items: center;
        }
        .work-window {
            width: 90%; height: 85%; background: white; 
            border: 5px solid var(--border-color); display: flex; flex-direction: column;
        }
        .work-header {
            background: var(--border-color); color: white; padding: 5px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #work-iframe { width: 100%; flex-grow: 1; border: none; background: #eee; }

        .gashapon-machine { width: 280px; display: flex; flex-direction: column; align-items: center; }
        .gashapon-globe { width: 200px; height: 200px; background: rgba(255, 255, 255, 0.2); border: 6px solid #fff; border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2); }
        .ball-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .ball { width: 26px; height: 26px; border-radius: 50%; position: absolute; border: 1px solid rgba(0,0,0,0.1); box-shadow: inset -2px -2px 4px rgba(0,0,0,0.15); }
        .gashapon-base { width: 140px; height: 80px; background: #ff4757; margin-top: -15px; border: 5px solid var(--border-color); border-radius: 0 0 20px 20px; display: flex; flex-direction: column; align-items: center; z-index: 1; }
        #out-ball { width: 28px; height: 28px; border-radius: 50%; display: none; animation: dropBall 0.5s ease-out forwards; }
        @keyframes dropBall { 0% { transform: scale(0) translateY(-20px); } 100% { transform: scale(1) translateY(0); } }
        .shaking .ball { animation: gravityShake 0.1s infinite; }
        @keyframes gravityShake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(3px, -4px); } }
        .album-window { width: 85%; height: 70%; background: var(--panel-color); border: 5px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; flex-grow: 1; margin-bottom: 10px; }
        .photo-item { width: 100%; aspect-ratio: 1; object-fit: cover; border: 2px solid var(--border-color); }
        #name-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 101; }
        
        .play-window { width: 80%; background: var(--panel-color); border: 5px solid var(--border-color); padding: 15px; text-align: center; border-radius: 8px; }
        .game-menu { display: flex; justify-content: space-around; gap: 10px; margin: 20px 0; }
        .game-item-btn { flex: 1; height: 70px; background: #fff; border: 3px solid var(--border-color); border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; box-shadow: 2px 2px 0 var(--border-color); font-weight: bold; font-size: 13px; }
        .game-item-btn:active { box-shadow: 0 0 0; transform: translate(2px, 2px); }
        .game-item-btn .game-icon { font-size: 24px; }

        #paparazzi-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); display: none; z-index: 300;
            justify-content: center; align-items: center;
        }
        .newspaper-box {
            width: 80%; background: #f2ebd9; border: 4px double #333;
            padding: 15px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            font-family: "SimSun", "Georgia", serif; text-align: center;
        }
        .newspaper-header {
            font-size: 11px; border-bottom: 2px dashed #333; padding-bottom: 4px;
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; display: flex; justify-content: space-between;
        }
        .newspaper-title {
            font-size: 18px; font-weight: bold; color: #b33939; margin: 10px 0;
            line-height: 1.4; border-bottom: 1px solid #333; padding-bottom: 8px;
        }
        .newspaper-body { font-size: 13px; line-height: 1.6; color: #2c3e50; margin-bottom: 15px; text-align: left; text-indent: 2em; }
        .newspaper-footer { display: flex; justify-content: space-around; font-size: 12px; background: #fff; padding: 5px; border: 1px solid #333; margin-bottom: 15px; font-weight: bold;}

        /* ✨ 新增：奧斯卡結局彈窗樣式 ✨ */
        #oscar-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            display: none; z-index: 500; justify-content: center; align-items: center;
            color: #f1c40f; text-align: center; font-family: 'Georgia', 'Microsoft YaHei', serif;
        }
        .oscar-box {
            width: 85%; padding: 25px; border: 4px solid #f1c40f; border-radius: 15px;
            background: rgba(0, 0, 0, 0.85); box-shadow: 0 0 30px #f1c40f;
            animation: goldGlow 2s infinite alternate;
        }
        @keyframes goldGlow { 0% { box-shadow: 0 0 20px #d35400; } 100% { box-shadow: 0 0 40px #f1c40f; } }
        .oscar-trophy { font-size: 60px; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .oscar-title { font-size: 24px; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; color: #fff; text-shadow: 0 0 10px #f1c40f; }
        .oscar-body { font-size: 14px; color: #eceff1; line-height: 1.8; text-align: left; margin-bottom: 20px; text-indent: 2em;}
        .oscar-stats { font-size: 15px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; border: 1px dashed #f1c40f; margin-bottom: 20px; color: #fff; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="name-overlay">
        <div style="background:var(--panel-color); padding:25px; border:4px solid var(--border-color); text-align:center;">
            <h3 style="margin-top:0">給宣萱起個小名吧</h3>
            <input type="text" id="name-input" placeholder="輸入名字..." style="padding:10px; margin-bottom:15px; border:2px solid var(--border-color);">
            <br><button onclick="startGame()" style="width:100px">進入</button>
        </div>
    </div>

    <div id="work-overlay">
        <div class="work-window">
            <div class="work-header">
                <span id="work-title">🎬 劇組拍攝中...</span>
                <button onclick="handleTopRightClose()" style="background:#ff7675; color:white; border:none; padding:2px 10px; cursor:pointer;">退出</button>
            </div>
            <iframe id="work-iframe" src=""></iframe>
        </div>
    </div>

    <div id="paparazzi-overlay">
        <div class="newspaper-box">
            <div class="newspaper-header">
                <span>💥 獨家爆料周刊 💥</span>
                <span id="news-date">2026.05</span>
            </div>
            <div class="newspaper-title" id="news-title">震驚！某當紅女星深夜做出了這種事！</div>
            <div class="newspaper-body" id="news-body">據前方記者冒死偷拍回傳的畫面顯示……</div>
            <div class="newspaper-footer">
                <span style="color:#c0392b;" id="news-effect-happy">心情 -0</span>
                <span style="color:#2980b9;" id="news-effect-fans">粉絲 +0</span>
            </div>
            <button onclick="closeNewsWindow()" style="background:#333; color:white; border:none; padding:6px 20px; cursor:pointer; font-weight:bold;">我知道了</button>
        </div>
    </div>

    <div id="oscar-overlay">
        <div class="oscar-box">
            <div class="oscar-trophy">🏆</div>
            <div class="oscar-title">🎉 世紀終章：榮登奧斯卡影后！</div>
            <div class="oscar-body" id="oscar-body"></div>
            <div class="oscar-stats" id="oscar-stats"></div>
            <button onclick="location.reload()" style="background:#f1c40f; color:#000; border:none; padding:8px 25px; cursor:pointer; font-weight:bold; border-radius:5px;">星途再啟 (重玩)</button>
        </div>
    </div>

    <div id="gashapon-overlay" class="overlay">
        <div class="gashapon-machine">
            <div class="gashapon-globe" id="gas-globe">
                <div class="ball-container" id="ball-container"></div>
            </div>
            <div class="gashapon-base">
                <div style="width:45px; height:45px; background:#2f3542; border:3px solid var(--border-color); border-radius:50%; margin-top:10px; display:flex; justify-content:center; align-items:center;">
                    <div id="out-ball"></div>
                </div>
            </div>
            <div style="margin-top:10px; text-align:center;">
                <div id="gas-result" style="color:white; font-weight:bold; min-height: 20px;">50$ 抽一次</div>
                <button onclick="drawGashapon()" id="draw-btn" style="margin-top:10px; background:#feca57; width:120px;">扭一下！</button>
                <button onclick="closeGashapon()" style="margin-top:5px; width:120px; font-size:10px;">返回</button>
            </div>
        </div>
    </div>

    <div id="preview-overlay" class="overlay">
        <div style="width:75%; background:white; border:5px solid var(--border-color); padding:10px; text-align:center; border-radius:8px;">
            <h4 style="margin:5px 0">📸 剛剛拍好的！</h4>
            <img id="preview-img" src="" style="width:100%; border:2px solid #333; margin-bottom:10px;">
            <button onclick="confirmPhoto()" style="width: 100%; background: #ffcc80;">存入影集</button>
        </div>
    </div>

    <div id="album-overlay" class="overlay">
        <div class="album-window">
            <h4 style="margin-top:0; border-bottom:2px solid #5d4037;">夥伴影集</h4>
            <div class="photo-grid" id="photo-grid"></div>
            <button onclick="closeAlbum()">關閉</button>
        </div>
    </div>

    <div id="play-overlay" class="overlay">
        <div class="play-window">
            <h4 style="margin-top:0; border-bottom:2px solid #5d4037; padding-bottom:5px;">🧸 陪它玩點 what？</h4>
            <div class="game-menu">
                <button class="game-item-btn" onclick="startCardGame()">
                    <span class="game-icon">🃏</span>
                    <span>抽卡遊戲</span>
                </button>
                <button class="game-item-btn" onclick="startLinkGame()">
                    <span class="game-icon">🧩</span>
                    <span>連連看</span>
                </button>
            </div>
            <button onclick="closePlayMenu()" style="width: 100px;">返回</button>
        </div>
    </div>

    <div class="status-bar">
        <div>夥伴: <span id="ui-name">-</span></div>
        <div>狀態: <span id="ui-state">準備就緒</span></div>
        <div>體力: <span id="ui-hp">100</span></div>
        <div>心情: <span id="ui-happy">100</span></div>
        <div style="color:var(--accent-color);">💰 資金: <span id="ui-money">100</span></div>
        <div style="color:var(--fans-color);">✨ 粉絲數: <span id="ui-fans">0</span></div>
    </div>

    <div id="stage">
        <div id="pet-anchor">
            <div id="bubble"></div>
            <img id="pet-img" src="assets/stand_l.png">
        </div>
    </div>

    <div class="controls">
        <button class="icon-btn" onclick="handleAction('feed')" title="投餵蛋糕 (15$)">🍰</button>
        <button class="icon-btn" onclick="handleAction('sleep')" title="命令補覺">💤</button>
        <button class="icon-btn" onclick="handleAction('play')" title="陪它玩耍">🧸</button>
        <button id="selfie-btn" class="icon-btn lock-style" onclick="handleAction('selfie')" title="未解鎖自拍 (500$解鎖)">🔒</button>
        <button class="icon-btn work-btn" onclick="openWorkWindow()" title="🎬 拍戲打工">🎭</button>
        <button class="icon-btn album-btn" onclick="toggleAlbum()" title="查看影集">🖼️</button>
        <button class="icon-btn gashapon-btn" onclick="openGashapon()" title="去扭蛋">🎰</button>
    </div>

    <div class="log" id="game-log"></div>
</div>

<script>
    const IMG_PATH = "assets/";
    const SELFIE_POOL = ["s_1.jpg", "s_2.jpg", "s_3.jpg", "s_4.jpg","s_5.jpg", "s_6.jpg", "s_7.jpg", "s_8.jpg","s_9.jpg", "s_10.jpg", "s_11.jpg", "s_12.jpg","s_13.jpg", "s_14.jpg", "s_15.jpg", "s_16.jpg","s_17.jpg", "s_18.jpg","s_19.jpg", "s_20.jpg","s_21.jpg", "s_22.jpg", "s_23.jpg", "s_24.jpg","s_25.jpg", "s_26.jpg", "s_27.jpg","s_28.jpg","s1.jpg", "s2.jpg", "s3.jpg", "s4.jpg","s5.jpg", "s6.jpg", "s7.jpg", "s8.jpg","s9.jpg", "s10.jpg", "s11.jpg", "s12.jpg","s13.jpg", "s14.jpg", "s15.jpg", "s16.jpg","s17.jpg", "s18.jpg","s19.jpg", "s20.jpg","s21.jpg", "s22.jpg", "s23.jpg", "s24.jpg","s25.jpg", "s26.jpg", "s27.jpg","s28.jpg","s29.jpg","s30.jpg","s31.jpg"];
    const BALL_COLORS = ['#93A957', '#F7EDB5', '#BABE5F', '#E6EFA3', '#F8F1E1', '#B2CA48', '#A4C674'];

    const pet = {
        name: "", hp: 100, happy: 100, money: 100, fans: 0, 
        state: 'idle', posX: 50,
        isAnimating: false, isAway: false,
        tempPhoto: null, album: [],
        lastSelfieTime: 0, selfieSpamCount: 0,
        isSelfieUnlocked: false,
        consecutiveCakes: 0,
        isGameOver: false // 新增狀態鎖死
    };

    const anims = {
        blink: ["stand_l.png", "blink_1.png", "blink_2.png",  "stand_l.png"],
        feed: { loop: ["eat_1.png", "stand_l.png", "eat_2.png"] },
        sleep: { pre: ["stand_l.png"], loop: ["sleep_1.png", "sleep_2.png","sleep_3.png"], post: ["stand_l.png"] },
        scared: ["scared_1.png", "dazed.png", "stand_l.png"],
        funny: ["stand_l.png",  "blink_1.png", "stand_l.png"],
        walk_left: ["walk_l1.png", "stand_l.png"],
        walk_right: ["walk_r1.png", "stand_l.png"]
    };

    function startGame() {
        pet.name = document.getElementById('name-input').value || "小豬";
        document.getElementById('ui-name').innerText = pet.name;
        document.getElementById('name-overlay').style.display = 'none';
        initGashaponBalls();
        updateUI();
        autoBlink();
        startSystem();
        startPetAI();
    }

    function updateUI() {
        if(pet.isGameOver) return;
        
        document.getElementById('ui-hp').innerText = pet.hp;
        document.getElementById('ui-happy').innerText = pet.happy;
        document.getElementById('ui-money').innerText = pet.money;
        document.getElementById('ui-fans').innerText = pet.fans; 
        document.getElementById('ui-state').innerText = pet.isAway ? "離家出走中" : getStateLabel();
        document.getElementById('pet-anchor').style.left = pet.posX + '%';
        
        // ✨ 結局判定核心檢查：粉絲數達到 5000 觸發奧斯卡影后結局 ✨
        if (pet.fans >= 5000) {
            triggerOscarEnding();
            return;
        }

        if (pet.money < 30 && !pet.isAway) triggerRunaway();

        const sBtn = document.getElementById('selfie-btn');
        if (pet.isSelfieUnlocked) {
            sBtn.innerText = "📸";
            sBtn.classList.remove('lock-style');
            sBtn.title = "討要自拍";
        }
    }

    // ✨ 新增：奧斯卡影后結局觸發函數 ✨
    function triggerOscarEnding() {
        pet.isGameOver = true;
        // 關閉所有日常彈窗阻礙
        document.getElementById('paparazzi-overlay').style.display = 'none';
        document.getElementById('work-overlay').style.display = 'none';
        document.getElementById('gashapon-overlay').style.display = 'none';
        document.getElementById('play-overlay').style.display = 'none';

        const bodyText = `全球影迷見證歷史！恭喜頂流巨星 ${pet.name} 憑藉在多部現象級大作中的殿堂級演技，成功斬獲本屆奧斯卡金像獎【最佳女主角】桂冠！她從一個在街頭被狗仔偷拍炫蛋糕的小豬女孩，一路披荊斬棘，終於登頂世界影壇之巔！全網唯粉、事業粉抱頭痛哭：「寶寶值得！你是全宇宙最好的 ${pet.name}！」`;
        const statsText = `👑 最終巨星資產結算 👑<br>✨ 巔峰粉絲數：${pet.fans}名<br>💰 最終殺青金：$${pet.money}<br>❤️ 最終幸福值：${pet.happy}`;

        document.getElementById('oscar-body').innerHTML = bodyText;
        document.getElementById('oscar-stats').innerHTML = statsText;
        document.getElementById('oscar-overlay').style.display = 'flex';
    }

    function getStateLabel() {
        const m = {idle:'發呆中', feed:'乾飯', sleep:'補覺', selfie:'營業中', funny:'搞怪中', scavenge:'撿破爛', work: '拍戲中', play: '玩耍中'};
        return m[pet.state] || '探索中';
    }

    function addLog(msg) {
        const log = document.getElementById('game-log');
        log.innerHTML = `<div style="margin-bottom:4px">• ${msg}</div>` + log.innerHTML;
    }

    function say(text) {
        const b = document.getElementById('bubble');
        b.innerText = text; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 2500);
    }

    async function playSequence(frames, speed = 250) {
        const img = document.getElementById('pet-img');
        for (let f of frames) {
            if(pet.isAway) break;
            img.src = IMG_PATH + f;
            await new Promise(r => setTimeout(r, speed));
        }
    }

    // 🎬 微調：優化進組打工判定
    function openWorkWindow() {
        if (pet.isAway || pet.isAnimating || pet.isGameOver) return;
        if (pet.hp < 20) {
            say("太累了，先讓我睡一覺吧...💤");
            return;
        }
        pet.isAnimating = true;
        pet.state = 'work';
        pet.consecutiveCakes = 0; // 只要去拍戲，小蛋糕計數清零
        updateUI();
        document.getElementById('work-title').innerText = "🎬 劇組籌備中...";
        document.getElementById('work-iframe').src = 'work.html'; 
        document.getElementById('work-overlay').style.display = 'flex';
        addLog(`${pet.name} 進組挑劇本了...`);
    }

    function handleTopRightClose() {
        if (pet.state === 'work') {
            closeWork(true);
        } else if (pet.state === 'play') {
            closeGameEarly();
        }
    }

    // 🛠️ 微調：徹底修復微調 iframe message 觸發 closeWork 引起的重複或卡死判定
    window.addEventListener('message', function(e) {
        if (pet.isGameOver) return;

        // 只有明確是普通關閉指令時才執行手動退出
        if (e.data === 'closePopupOnly') {
            closeWork(true);
            return;
        }
        
        // 成功拍戲殺青完結結算

    async function drawGashapon() {
        if (pet.money < 50) { document.getElementById('gas-result').innerText = "錢不夠了..."; return; }
        pet.money -= 50; updateUI();
        const btn = document.getElementById('draw-btn');
        const globe = document.getElementById('gas-globe');
        const outBall = document.getElementById('out-ball');
        btn.disabled = true; outBall.style.display = 'none';
        globe.classList.add('shaking');
        await new Promise(r => setTimeout(r, 1200));
        globe.classList.remove('shaking');
        
        const roll = Math.random();
        let mult = 0; let prize = "";
        if (roll < 0.05) { mult = 10; prize = "一等獎(x10)!"; }
        else if (roll < 0.15) { mult = 5; prize = "二等獎(x5)!"; }
        else if (roll < 0.65) { mult = 0.8; prize = "三等獎(x0.8)"; } 
        else if (roll < 0.85) { mult = 0.5; prize = "四等獎(x0.5)"; }
        else { mult = 0; prize = "五等獎(空頭)"; }

        const win = Math.floor(50 * mult);
        pet.money += win;
        outBall.style.backgroundColor = BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)];
        outBall.style.display = 'block';
        document.getElementById('gas-result').innerText = `${prize} 獲得 ${win}$`;
        addLog(`抽中${prize}，餘額 ${pet.money}$。`);
        btn.disabled = false; updateUI();

        // ✨ 觸發概率狗仔隊偷拍
        if (!pet.isGameOver && Math.random() < 0.20) {
            triggerPaparazzi('gashapon');
        }
    }

        if ((pet.isAnimating && !isAI) || pet.isAway || pet.isGameOver) return;
        
        if (action === 'selfie') {
            if (!pet.isSelfieUnlocked) {
                if (confirm("自拍功能尚未開啟！是否花費 5000$ 購買“拍立得相機”解鎖？")) {
                    if (pet.money >= 5000) {
                        pet.money -= 5000;
                        pet.isSelfieUnlocked = true;
                        addLog(`成功解鎖自拍功能！花費了 5000$。`);
                        say("哇！我有相機啦！");
                        updateUI();
                    } else {
                        say("錢不夠買相機呢...");
                    }
                }
                return;
            }

            const now = Date.now();
            if (now - pet.lastSelfieTime < 10000) {
                if (++pet.selfieSpamCount >= 2) {
                    pet.isAnimating = true; addLog(`${pet.name} 覺得你太煩了，拒絕拍照！`); say("拍太多了啦！"); pet.happy = Math.max(0, pet.happy - 10);
                    await playSequence(anims.scared, 200); pet.isAnimating = false; pet.state = 'idle';
                } else { say("歇一會再拍嘛..."); }
                updateUI(); return;
            }
            pet.isAnimating = true; pet.state = 'selfie'; pet.selfieSpamCount = 0; pet.lastSelfieTime = now; updateUI();
            addLog(`${pet.name} 擺好了姿勢...`); say("找找角度..."); await playSequence(anims.funny, 400);
            const photo = SELFIE_POOL[Math.floor(Math.random() * SELFIE_POOL.length)];
            say("茄子！📸"); 
            setTimeout(() => { 
                showPreview(photo); 
                pet.isAnimating = false; pet.state = 'idle'; 
                pet.happy = Math.min(100, pet.happy + 10); 
                updateUI(); 

                // ✨ 觸發概率自拍狗仔隊偷拍
                if (!pet.isGameOver && Math.random() < 0.25) { triggerPaparazzi('selfie'); }
            }, 800);
            return;
        }

        switch(action) {
            case 'walk_left': pet.isAnimating = true; pet.state = action; updateUI(); for(let i=0; i<3; i++) { if (pet.posX <= 15) break; pet.posX -= 8; updateUI(); await playSequence(anims.walk_left, 180); } pet.isAnimating = false; pet.state = 'idle'; updateUI(); break;
            case 'walk_right': pet.isAnimating = true; pet.state = action; updateUI(); for(let i=0; i<3; i++) { if (pet.posX >= 85) break; pet.posX += 8; updateUI(); await playSequence(anims.walk_right, 180); } pet.isAnimating = false; pet.state = 'idle'; updateUI(); break;
            case 'feed': 
                pet.isAnimating = true; pet.state = action; updateUI(); 
                if (pet.money < 15) { 
                    say("錢不夠買蛋糕..."); 
                    pet.isAnimating = false; pet.state = 'idle'; updateUI();
                } else { 
                    pet.money -= 15; 
                    pet.consecutiveCakes++; 
                    addLog(`投餵了蛋糕。`); say("好吃！"); 
                    await playSequence([...anims.feed.loop, ...anims.feed.loop]); 
                    pet.hp = Math.min(100, pet.hp + 20); 
                    pet.isAnimating = false; pet.state = 'idle'; updateUI();
                    
                    if (!pet.isGameOver && Math.random() < 0.12) {
                        setTimeout(() => {
                            triggerPaparazzi('feed');
                        }, 400);
                    }
                } 
                break;
            case 'sleep': 
                pet.isAnimating = true; pet.state = action; updateUI(); addLog(`${pet.name} 進入了夢鄉。`); 
                pet.consecutiveCakes = 0; 
                await playSequence(anims.sleep.pre); for(let i=0; i<2; i++) await playSequence(anims.sleep.loop, 600); await playSequence(anims.sleep.post); pet.hp = Math.min(100, pet.hp + 30); pet.isAnimating = false; pet.state = 'idle'; updateUI(); break;
            case 'idle': pet.isAnimating = true; pet.state = action; updateUI(); pet.posX = 50; addLog(`${pet.name} 乖乖回到了中間。`); pet.isAnimating = false; pet.state = 'idle'; updateUI(); break;
            case 'play': 
                pet.consecutiveCakes = 0; 
                document.getElementById('play-overlay').style.display = 'flex';
                break;
        }
    }

    async function startPetAI() {
        while(true) {
            await new Promise(r => setTimeout(r, 8000));
            if (!pet.isAway && !pet.isAnimating && !pet.isGameOver) {
                const roll = Math.random();
                if (roll < 0.35) await triggerFunnyEvent();
                else if (roll < 0.65) { pet.posX = Math.max(15, Math.min(85, pet.posX + (Math.random() > 0.5 ? 20 : -20))); updateUI(); }
            }
        }
    }

    async function autoBlink() {
        while(true) {
            await new Promise(r => setTimeout(r, 4000));
            if (!pet.isAnimating && !pet.isAway && !pet.isGameOver) await playSequence(anims.blink, 150);
        }
    }

    function startSystem() {
        setInterval(() => { if(!pet.isAway && !pet.isGameOver) { pet.hp = Math.max(0, pet.hp - 1); pet.happy = Math.max(0, pet.happy - 1); updateUI(); } }, 5000);
    }
</script>
